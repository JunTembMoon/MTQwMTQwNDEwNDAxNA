<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>우리 반이 만난 시간</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #fff6dc;
      --bg2: #f7f0ff;
      --bg3: #dff7ff;
      --card: rgba(255, 255, 255, 0.72);
      --text-main: #16223a;
      --text-sub: #3c4a66;
      --accent: #ff7a18;
      --accent2: #ffb347;
      --chip-bg: rgba(255, 255, 255, 0.9);
      --chip-text: #0f1d36;
      --shadow: 0 20px 45px rgba(20, 34, 58, 0.16);
    }

    body[data-theme="sky"] {
      --bg1: #e2f4ff;
      --bg2: #e8ebff;
      --bg3: #f2fdff;
      --card: rgba(255, 255, 255, 0.75);
      --text-main: #10253e;
      --text-sub: #385676;
      --accent: #1f8cff;
      --accent2: #54d2ff;
      --chip-bg: rgba(245, 252, 255, 0.95);
      --chip-text: #0b325a;
    }

    body[data-theme="sunset"] {
      --bg1: #fff0d2;
      --bg2: #ffd7d8;
      --bg3: #ffeccf;
      --card: rgba(255, 255, 255, 0.7);
      --text-main: #3a1f1b;
      --text-sub: #6b4039;
      --accent: #ff5722;
      --accent2: #ff9800;
      --chip-bg: rgba(255, 247, 236, 0.92);
      --chip-text: #4a2016;
    }

    body[data-theme="mint"] {
      --bg1: #e8ffe7;
      --bg2: #d9fff3;
      --bg3: #f2fff5;
      --card: rgba(255, 255, 255, 0.74);
      --text-main: #10312a;
      --text-sub: #2f6156;
      --accent: #1fba7a;
      --accent2: #49d3a6;
      --chip-bg: rgba(240, 255, 248, 0.95);
      --chip-text: #0c4a3b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 122, 24, 0.24), transparent 36%),
        radial-gradient(circle at 88% 80%, rgba(77, 169, 255, 0.25), transparent 36%),
        linear-gradient(140deg, var(--bg1) 0%, var(--bg2) 52%, var(--bg3) 100%);
      overflow: hidden;
    }

    .card {
      width: min(920px, 100%);
      border-radius: 26px;
      padding: clamp(24px, 5vw, 46px);
      background: var(--card);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.62);
      animation: rise 0.8s ease-out;
    }

    .badge {
      display: inline-block;
      margin: 0;
      padding: 8px 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 0.88rem;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .theme-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-sub);
      font-size: 0.9rem;
      font-weight: 600;
    }

    #themeSelect {
      border: 1px solid rgba(22, 34, 58, 0.18);
      border-radius: 10px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.85);
      color: var(--text-main);
      font-weight: 600;
      outline: none;
    }

    h1 {
      margin: 0;
      line-height: 1.3;
      font-size: clamp(1.6rem, 3.2vw, 2.5rem);
      font-family: "Do Hyeon", "Malgun Gothic", sans-serif;
      color: var(--text-main);
    }

    #sentence {
      margin: 20px 0 0;
      font-size: clamp(1.05rem, 2.4vw, 1.45rem);
      line-height: 1.75;
      color: var(--text-sub);
      font-weight: 600;
    }

    #output {
      display: inline-block;
      margin: 0 8px;
      padding: 3px 12px;
      border-radius: 10px;
      color: var(--chip-text);
      background: var(--chip-bg);
      border: 1px solid rgba(22, 34, 58, 0.14);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .start-time {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #5b6985;
    }

    .meal-card {
      margin-top: 20px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid rgba(22, 34, 58, 0.12);
    }

    .meal-title {
      margin: 0 0 10px;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .meal-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    #mealDate {
      border: 1px solid rgba(22, 34, 58, 0.18);
      border-radius: 10px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text-main);
      font-weight: 600;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .btn.secondary {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(22, 34, 58, 0.16);
    }

    #mealResult {
      margin-top: 12px;
      color: var(--text-sub);
      line-height: 1.65;
      font-weight: 600;
    }

    #mealMenu {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    #mealMenu li {
      margin: 4px 0;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="top-row">
      <p class="badge">저는...</p>
      <label class="theme-control" for="themeSelect">
        테마
        <select id="themeSelect">
          <option value="default">기본</option>
          <option value="sky">스카이</option>
          <option value="sunset">선셋</option>
          <option value="mint">민트</option>
        </select>
      </label>
    </div>
    <h1>함께한 시간을 세고 있어요</h1>
    <p id="sentence">
      우리 4반은
      <span id="output">계산 중...</span>
      동안 함께했습니다.
    </p>
    <p class="start-time">기준 시각: 2026년 3월 3일 오전 9시 00분 00초</p>

    <section class="meal-card">
      <p class="meal-title">급식 확인</p>
      <div class="meal-controls">
        <input id="mealDate" type="date">
        <button id="mealSearch" class="btn" type="button">조회</button>
        <button id="mealToday" class="btn secondary" type="button">오늘</button>
        <button id="mealTomorrow" class="btn secondary" type="button">내일</button>
      </div>
      <div id="mealResult">날짜를 선택한 뒤 조회를 눌러 주세요.</div>
      <ul id="mealMenu"></ul>
    </section>
  </main>

  <script>
    const start = new Date(2026, 2, 3, 9, 0, 0, 0); // 2026-03-03 09:00:00 (로컬 시간)
    const output = document.getElementById("output");
    const themeSelect = document.getElementById("themeSelect");
    const mealDateInput = document.getElementById("mealDate");
    const mealSearchButton = document.getElementById("mealSearch");
    const mealTodayButton = document.getElementById("mealToday");
    const mealTomorrowButton = document.getElementById("mealTomorrow");
    const mealResult = document.getElementById("mealResult");
    const mealMenu = document.getElementById("mealMenu");

    const neisConfig = {
      officeCode: "J10", // 경기도교육청
      schoolCode: "7731008" // 양평중학교
    };

    function applyTheme(themeName) {
      if (!themeName || themeName === "default") {
        document.body.removeAttribute("data-theme");
      } else {
        document.body.setAttribute("data-theme", themeName);
      }
    }

    function initializeTheme() {
      const savedTheme = localStorage.getItem("theme");
      const theme = savedTheme || "default";
      themeSelect.value = theme;
      applyTheme(theme);
    }

    themeSelect.addEventListener("change", function () {
      const theme = themeSelect.value;
      localStorage.setItem("theme", theme);
      applyTheme(theme);
    });

    function addYears(date, yearsToAdd) {
      const next = new Date(date);
      next.setFullYear(next.getFullYear() + yearsToAdd);
      return next;
    }

    function addMonths(date, monthsToAdd) {
      const next = new Date(date);
      next.setMonth(next.getMonth() + monthsToAdd);
      return next;
    }

    function formatTwoDigits(num) {
      return String(num).padStart(2, "0");
    }

    function diffFromStartToNow() {
      const now = new Date();

      if (now < start) {
        output.textContent = "아직 시작 전";
        return;
      }

      let cursor = new Date(start);
      let years = 0;
      let months = 0;

      while (addYears(cursor, 1) <= now) {
        cursor = addYears(cursor, 1);
        years += 1;
      }

      while (addMonths(cursor, 1) <= now) {
        cursor = addMonths(cursor, 1);
        months += 1;
      }

      let remainingMs = now - cursor;

      const dayMs = 24 * 60 * 60 * 1000;
      const hourMs = 60 * 60 * 1000;
      const minuteMs = 60 * 1000;
      const secondMs = 1000;

      const days = Math.floor(remainingMs / dayMs);
      remainingMs -= days * dayMs;

      const hours = Math.floor(remainingMs / hourMs);
      remainingMs -= hours * hourMs;

      const minutes = Math.floor(remainingMs / minuteMs);
      remainingMs -= minutes * minuteMs;

      const seconds = Math.floor(remainingMs / secondMs);
      remainingMs -= seconds * secondMs;

      const centiseconds = Math.floor(remainingMs / 10); // 0~99

      output.textContent =
        years + "년 " +
        months + "개월 " +
        days + "일 " +
        hours + "시간 " +
        minutes + "분 " +
        seconds + "초 " +
        formatTwoDigits(centiseconds);
    }

    function toInputDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    function toApiDate(dateText) {
      return dateText.replaceAll("-", "");
    }

    function normalizeMealName(name) {
      return name
        .replace(/<br\s*\/?\s*>/gi, "\n")
        .replace(/\([^\)]*\d[^\)]*\)/g, "")
        .replace(/\*/g, "")
        .trim();
    }

    function renderMeal(menuText, kcalText) {
      const lines = menuText
        .split("\n")
        .map(function (line) {
          return line.trim();
        })
        .filter(Boolean);

      mealMenu.innerHTML = "";
      lines.forEach(function (line) {
        const li = document.createElement("li");
        li.textContent = line;
        mealMenu.appendChild(li);
      });

      mealResult.textContent = kcalText ? "중식 " + kcalText : "중식";
    }

    async function fetchMealByDate(dateText) {
      if (!dateText) {
        mealResult.textContent = "먼저 날짜를 선택해 주세요.";
        mealMenu.innerHTML = "";
        return;
      }

      mealResult.textContent = "급식 정보를 불러오는 중...";
      mealMenu.innerHTML = "";

      const mealDate = toApiDate(dateText);
      const url =
        "https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&pIndex=1&pSize=20" +
        "&ATPT_OFCDC_SC_CODE=" + encodeURIComponent(neisConfig.officeCode) +
        "&SD_SCHUL_CODE=" + encodeURIComponent(neisConfig.schoolCode) +
        "&MLSV_YMD=" + encodeURIComponent(mealDate);

      try {
        const response = await fetch(url);
        const data = await response.json();
        const payload = data.mealServiceDietInfo;

        if (!payload || !payload[1] || !payload[1].row || payload[1].row.length === 0) {
          mealResult.textContent = "선택한 날짜의 급식 정보가 없습니다.";
          return;
        }

        const row = payload[1].row[0];
        const cleanedMenu = normalizeMealName(row.DDISH_NM || "");
        renderMeal(cleanedMenu, row.CAL_INFO || "");
      } catch (error) {
        mealResult.textContent = "급식 정보를 가져오지 못했습니다. 잠시 후 다시 시도해 주세요.";
      }
    }

    mealSearchButton.addEventListener("click", function () {
      fetchMealByDate(mealDateInput.value);
    });

    mealTodayButton.addEventListener("click", function () {
      const today = new Date();
      mealDateInput.value = toInputDate(today);
      fetchMealByDate(mealDateInput.value);
    });

    mealTomorrowButton.addEventListener("click", function () {
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      mealDateInput.value = toInputDate(tomorrow);
      fetchMealByDate(mealDateInput.value);
    });

    initializeTheme();
    mealDateInput.value = toInputDate(new Date());
    fetchMealByDate(mealDateInput.value);
    diffFromStartToNow();
    setInterval(diffFromStartToNow, 10);
  </script>
</body>
</html>
